apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  name: {{ .Values.storage.smb.pvName }}
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - nobrl
  csi:
    driver: smb.csi.k8s.io
    readOnly: false
    volumeHandle: smb-nas-volume
    volumeAttributes:
      source: {{ .Values.storage.smb.smbAddress }}
    nodeStageSecretRef:
      name: smb-creds
      namespace: {{ .Values.common.namespace }}
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ .Values.storage.smb.pvcClaimName }}
  namespace: {{ .Values.common.namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: {{ .Values.storage.smb.pvName }}
  storageClassName: smb