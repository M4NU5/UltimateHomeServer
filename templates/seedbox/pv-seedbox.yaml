apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-seedbox
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - nobrl
  csi:
    driver: smb.csi.k8s.io
    readOnly: false
    volumeHandle: seedbox-volume
    volumeAttributes:
      source: //rclone-seedbox.home-server.svc.cluster.local/data
    nodeStageSecretRef:
      name: seedbox-smb-creds
      namespace: home-server
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-seedbox
  namespace: home-server
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  volumeName: pv-seedbox
  storageClassName: smb