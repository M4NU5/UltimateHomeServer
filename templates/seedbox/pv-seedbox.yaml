apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-seedbox
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - port=30049
    - mountport=30049
    - nfsvers=3
  nfs:
    server: 127.0.0.1    # always valid on single node k3s
    path: /
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-seedbox
  namespace: home-server
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  volumeName: pv-seedbox
  storageClassName: ""