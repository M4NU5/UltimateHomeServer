apiVersion: apps/v1
kind: Deployment
metadata:
  name: rclone-seedbox
  namespace: home-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rclone-seedbox
  template:
    metadata:
      labels:
        app: rclone-seedbox
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: rclone
        image: rclone/rclone:1.68.2
        command:
          - rclone
          - mount
          - :sftp,host=$(FTP_HOST),user=$(FTP_USER),pass=$(FTP_PASS),port=$(FTP_PORT):/storage/watch/qbittorrent
          - /mnt/seedbox
          - --allow-other
          - --vfs-cache-mode=writes
          - --vfs-cache-max-size=10G
          - --log-level=INFO
          - --no-check-certificate
        env:
          - name: FTP_HOST
            valueFrom:
              secretKeyRef:
                name: seedbox-ftp-creds
                key: host
          - name: FTP_PORT
            valueFrom:
              secretKeyRef:
                name: seedbox-ftp-creds
                key: port
          - name: FTP_USER
            valueFrom:
              secretKeyRef:
                name: seedbox-ftp-creds
                key: username
          - name: FTP_PASS
            valueFrom:
              secretKeyRef:
                name: seedbox-ftp-creds
                key: password
        volumeMounts:
          - name: seedbox-mount
            mountPath: /mnt/seedbox
            mountPropagation: Bidirectional   # propagates FUSE mount to host
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        securityContext:
          privileged: true
          capabilities:
            add: ["SYS_ADMIN"]
      volumes:
        - name: seedbox-mount
          hostPath:
            path: /mnt/seedbox
            type: DirectoryOrCreate