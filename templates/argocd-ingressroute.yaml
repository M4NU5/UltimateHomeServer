apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.{{ .Values.services.traefik.domain }}`)
      services:
        - kind: Service
          name: argocd-server
          port: 80
      middlewares:
        - name: default-headers
  tls:
    secretName: bongofett-cert