apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-wildcard
  namespace: home-server
spec:
  secretName: bongofett-cert
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
  dnsNames:
    - bongofett.com
    - "*.bongofett.com"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns01