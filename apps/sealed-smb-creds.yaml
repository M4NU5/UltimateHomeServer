apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smb-credentials
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/M4NU5/UltimateHomeServer
    targetRevision: HEAD
    path: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: home-server
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true